name: Release

on:
  push:
    tags:
      - 'v*' # 只有在推送类似 v0.1.0 这样的 tag 时才会触发构建
  workflow_dispatch: # 允许在 GitHub Actions 网站上手动触发

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          # 先以草稿形式创建 release：仓库启用了 immutable releases，
          # 正式发布后无法再上传资产，因此必须等所有构建上传完成后再发布
          if ! gh release view $VERSION > /dev/null 2>&1; then
            gh release create $VERSION --title "AtlasGraph $VERSION" --notes-file .github/release_notes.md --draft
          fi

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # GitHub Actions 原生支持的物理机架构：Mac M芯片, Linux x86, Linux ARM, Windows x86, Windows ARM
        platform: [macos-latest, ubuntu-24.04, ubuntu-24.04-arm, windows-latest, windows-11-arm]
        # 所有可能的 feature 组合，kuzu 和 lbug 已经在逻辑中互斥分离
        features: 
          - 'neo4j'
          - 'kuzu'
          - 'lbug'
          - 'neo4j,kuzu'
          - 'neo4j,lbug'
        exclude:
          # kuzu 0.11.3 底部 C++ 强行绑定了 _AMD64_ 宏，导致 MSVC ARM64 编译报错，故剔除
          - platform: windows-11-arm
            features: 'kuzu'
          - platform: windows-11-arm
            features: 'lbug'
          - platform: windows-11-arm
            features: 'neo4j,kuzu'
          - platform: windows-11-arm
            features: 'neo4j,lbug'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev cmake clang libclang-dev xdg-utils

      - name: Modify configs for parallel builds
        shell: bash
        run: |
          # 提取逗号为下划线，作为文件名后缀，比如 neo4j_lbug
          FEATURES_STR="${{ matrix.features }}"
          SUFFIX="${FEATURES_STR//,/_}"
          
          echo "Building variant: $SUFFIX"
          
          # 动态修改 package.json 中的 features 使前端能读取到正确的环境变量或配置
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.atlasConfig = pkg.atlasConfig || {};
            pkg.atlasConfig.features = '${FEATURES_STR}'.split(',');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install frontend dependencies
        run: npm install

      # 使用官方 Tauri action 打包 (由于移除了 tagName 等参数，不再触发内置上传)
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          # 透传特征参数并在最后附带 --no-default-features 至 Cargo
          args: --features ${{ matrix.features }} -- --no-default-features

      # 手动重命名 Bundle 防止冲突并上传到 Github Release
      - name: Rename and Upload Bundles
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FEATURES_STR="${{ matrix.features }}"
          SUFFIX="${FEATURES_STR//,/_}"
          
          # Iterate over all generated bundles and installers
          find src-tauri/target/release/bundle -type f -name "AtlasGraph_*" | while read file; do
            dir=$(dirname "$file")
            filename=$(basename "$file")
            
            # e.g., AtlasGraph_0.1.5_aarch64.dmg -> AtlasGraph-neo4j_lbug_0.1.5_aarch64.dmg
            new_name=$(echo "$filename" | sed "s/^AtlasGraph_/AtlasGraph-${SUFFIX}_/")
            
            mv "$file" "$dir/$new_name"
            echo "Uploading $new_name to release ${{ github.ref_name }}..."
            gh release upload ${{ github.ref_name }} "$dir/$new_name" --clobber
          done

      # 追加上传单体/纯净可执行文件 (免安装版，仅 Windows 保留)
      - name: Upload Standalone Executable
        if: startsWith(matrix.platform, 'windows')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FEATURES_STR="${{ matrix.features }}"
          SUFFIX="${FEATURES_STR//,/_}"
          
          PLATFORM_NAME="${{ matrix.platform }}"
          if [[ "$PLATFORM_NAME" == "windows-latest" ]]; then
            OS_ARCH="windows-x86_64"
            EXE_PATH="src-tauri/target/release/atlas-graph.exe"
            EXT=".exe"
          elif [[ "$PLATFORM_NAME" == "windows-11-arm" ]]; then
            OS_ARCH="windows-arm64"
            EXE_PATH="src-tauri/target/release/atlas-graph.exe"
            EXT=".exe"
          fi
          
          NEW_NAME="AtlasGraph-standalone-${SUFFIX}-${OS_ARCH}${EXT}"
          
          if [ -f "$EXE_PATH" ]; then
            mv "$EXE_PATH" "./$NEW_NAME"
            echo "Uploading $NEW_NAME to release ${{ github.ref_name }}..."
            gh release upload ${{ github.ref_name }} "./$NEW_NAME" --clobber
          else
            echo "Warning: Standalone executable not found at $EXE_PATH"
          fi

  # 所有平台构建并上传成功后，才将草稿正式发布（发布后 release 即不可变）
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
